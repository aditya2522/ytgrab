[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "python3"]

[phases.install]
cmds = [
  "npm ci",
  "curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp",
  "chmod a+rx /usr/local/bin/yt-dlp"
]

[phases.build]
cmds = ["./node_modules/.bin/vite build"]

[start]
cmd = "node server.js"
